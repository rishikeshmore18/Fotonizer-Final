name: Build Android APK/AAB

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create google-services.json from secret
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json
            echo "✅ Created google-services.json from secret"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set - build may fail if required"
          fi

      - name: Create client_secret.json from secret
        run: |
          if [ -n "${{ secrets.CLIENT_SECRET_JSON }}" ]; then
            echo "${{ secrets.CLIENT_SECRET_JSON }}" > app/client_secret.json
            echo "✅ Created client_secret.json from secret"
          else
            echo "⚠️ CLIENT_SECRET_JSON secret not set - build may fail if required"
          fi

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Build Release APK (if signing configured)
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true
        env:
          # Use GitHub Secrets for signing (if configured)
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build AAB (if signing configured)
        run: ./gradlew bundleRelease --no-daemon
        continue-on-error: true
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: ignore

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f app/google-services.json
          rm -f app/client_secret*.json
          echo "✅ Cleaned up sensitive files"
