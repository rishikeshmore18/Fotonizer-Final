name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (if needed for website build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        # Only run if package.json exists in website folder
        if: hashFiles('website/package.json') != ''

      - name: Install dependencies (if needed)
        run: |
          if [ -f "website/package.json" ]; then
            cd website
            npm ci
          fi
        # Only run if package.json exists
        if: hashFiles('website/package.json') != ''

      - name: Build website (if needed)
        run: |
          if [ -f "website/package.json" ]; then
            cd website
            npm run build
          else
            echo "No build step needed - static website"
          fi
        env:
          GITHUB_PAGES: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload website folder (or dist if built)
          path: |
            website/
            !website/node_modules/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

